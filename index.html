<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>專案排程管理系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { 50:'#eff6ff',100:'#dbeafe',200:'#bfdbfe',300:'#93c5fd',400:'#60a5fa',500:'#3b82f6',600:'#2563eb',700:'#1d4ed8',800:'#1e40af',900:'#1e3a8a' }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-100 font-sans">

<!-- Auth Pages (shown when not logged in) -->
<div id="auth-container" class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-50 to-blue-100"></div>

<!-- Main App (shown when logged in) -->
<div id="app-container" class="hidden flex h-screen overflow-hidden bg-gray-100">
  <!-- Sidebar -->
  <div id="sidebar-container" class="flex-shrink-0"></div>
  <!-- Main Content -->
  <div class="flex flex-col flex-1 overflow-hidden">
    <div id="header-container"></div>
    <main id="page-container" class="flex-1 overflow-y-auto p-3 sm:p-6"></main>
  </div>
</div>

<!-- Modal Container -->
<div id="modal-container"></div>
<!-- Toast Container -->
<div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-2"></div>

<script src="js/data.js"></script>
<script src="js/utils.js"></script>
<script src="js/components/modal.js"></script>
<script src="js/components/sidebar.js"></script>
<script src="js/components/header.js"></script>
<script src="js/pages/login.js"></script>
<script src="js/pages/register.js"></script>
<script src="js/pages/forgotPassword.js"></script>
<script src="js/pages/dashboard.js"></script>
<script src="js/pages/notifications.js"></script>
<script src="js/pages/profile.js"></script>
<script src="js/pages/projects.js"></script>
<script src="js/pages/tasks.js"></script>
<script src="js/pages/gantt.js"></script>
<script src="js/pages/members.js"></script>
<script src="js/pages/reports.js"></script>
<script src="js/pages/myTasks.js"></script>
<script src="js/pages/taskDetail.js"></script>
<script src="js/pages/workProgress.js"></script>
<script src="js/pages/calendar.js"></script>
<script src="js/pages/files.js"></script>
<script src="js/pages/discussion.js"></script>
<script src="js/router.js"></script>
<script src="js/app.js"></script>
</body>
</html>
